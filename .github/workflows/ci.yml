name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build static site
        run: npm run build:gh-pages
        env:
          NEXT_PUBLIC_SITE_URL: https://capone06913.github.io/thailand
          NEXT_PUBLIC_BRAND_NAME: ThaiPass
          NEXT_PUBLIC_TELEGRAM_CHANNEL_URL: https://t.me/thaipass_visa
          NEXT_PUBLIC_TELEGRAM_CHANNEL_NAME: "@thaipass_visa"
          NEXT_PUBLIC_WHATSAPP_URL: https://wa.me/79000000000

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
