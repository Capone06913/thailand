name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: apps/web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Fix media paths in static export
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path("out")
          exts = {".html", ".js", ".css", ".json", ".txt", ".xml"}

          for p in root.rglob("*"):
              if not p.is_file() or p.suffix not in exts:
                  continue

              s = p.read_text(encoding="utf-8", errors="ignore")

              # убрать двойной /thailand/thailand/
              s = s.replace("/thailand/thailand/", "/thailand/")
              s = s.replace("\\/thailand\\/thailand\\/", "\\/thailand\\/")
              s = s.replace("%2Fthailand%2Fthailand%2F", "%2Fthailand%2F")

              # добавить /thailand только там, где его ещё нет
              s = re.sub(r'(?<!/thailand)/images/', '/thailand/images/', s)
              s = re.sub(r'(?<!/thailand)/video/', '/thailand/video/', s)
              s = re.sub(r'(?<!/thailand)/blog/covers/', '/thailand/blog/covers/', s)

              s = re.sub(r'(?<!\\/thailand)\\/images\\/', r'\\/thailand\\/images\\/', s)
              s = re.sub(r'(?<!\\/thailand)\\/video\\/', r'\\/thailand\\/video\\/', s)
              s = re.sub(r'(?<!\\/thailand)\\/blog\\/covers\\/', r'\\/thailand\\/blog\\/covers\\/', s)

              s = re.sub(r'(?<!%2Fthailand)%2Fimages%2F', '%2Fthailand%2Fimages%2F', s)
              s = re.sub(r'(?<!%2Fthailand)%2Fvideo%2F', '%2Fthailand%2Fvideo%2F', s)
              s = re.sub(r'(?<!%2Fthailand)%2Fblog%2Fcovers%2F', '%2Fthailand%2Fblog%2Fcovers%2F', s)

              # ещё раз убрать возможный дубль после замен
              s = s.replace("/thailand/thailand/", "/thailand/")
              s = s.replace("\\/thailand\\/thailand\\/", "\\/thailand\\/")
              s = s.replace("%2Fthailand%2Fthailand%2F", "%2Fthailand%2F")

              p.write_text(s, encoding="utf-8")
          PY

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4