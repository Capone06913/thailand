name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

defaults:
  run:
    working-directory: apps/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://capone06913.github.io
          NEXT_PUBLIC_BRAND_NAME: ThaiPass

      - name: Build GitHub Pages export
        run: npm run build:gh-pages
        env:
          NEXT_PUBLIC_SITE_URL: https://capone06913.github.io
          NEXT_PUBLIC_BRAND_NAME: ThaiPass
