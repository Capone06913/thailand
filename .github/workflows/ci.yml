name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: apps/web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Fix all media paths in static export
        run: |
          find out -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" \) -print0 | xargs -0 perl -pi -e 's#(?<!/thailand)/images/#/thailand/images/#g; s#(?<!/thailand)/video/#/thailand/video/#g; s#(?<!/thailand)/blog/covers/#/thailand/blog/covers/#g; s#\\?/images\\?/#/thailand/images/#g; s#\\?/video\\?/#/thailand/video/#g; s#%2Fimages%2F#%2Fthailand%2Fimages%2F#g; s#%2Fvideo%2F#%2Fthailand%2Fvideo%2F#g; s#%2Fblog%2Fcovers%2F#%2Fthailand%2Fblog%2Fcovers%2F#g'

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4